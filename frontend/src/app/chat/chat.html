<div class="max-w-2xl mx-auto flex flex-col h-screen p-4">
  <h1 class="text-xl font-semibold text-center mb-4">Chatbot RAG</h1>

  <div class="flex-1 overflow-y-auto space-y-3 mb-4 pr-2">
    @for (msg of messages(); track $index) {
      <div
        class="max-w-[75%] px-4 py-2 rounded-2xl w-fit"
        [class.ml-auto]="msg.role === 'user'"
        [class.bg-blue-500]="msg.role === 'user'"
        [class.text-white]="msg.role === 'user'"
        [class.mr-auto]="msg.role === 'bot'"
        [class.bg-gray-200]="msg.role === 'bot'"
        [class.text-gray-800]="msg.role === 'bot'"
      >
        {{ msg.text }}
      </div>
    }

    @if (loading()) {
      <div class="mr-auto bg-gray-200 text-gray-500 px-4 py-2 rounded-2xl w-fit italic">
        Le bot réfléchit...
      </div>
    }
  </div>

  <div class="flex gap-2">
    <input
      [ngModel]="userInput()"
      (ngModelChange)="userInput.set($event)"
      (keyup.enter)="send()"
      placeholder="Posez votre question..."
      class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <button
      (click)="send()"
      class="bg-blue-500 text-white px-5 py-2 rounded-full hover:bg-blue-600 transition"
    >
      Envoyer
    </button>
  </div>
</div>
